name: i2mv_stage2_joint
tag: "r512-ortho-nv6-joint-ft"
exp_root_dir: "outputs"
seed: 42

data_cls: mvadapter.data.multiview.MultiviewDataModule
data:
  root_dir: "/data/xyp/MV-Adapter/mvadapter/data/texture_ortho10view_easylight_objaverse"
  scene_list: "/data/xyp/MV-Adapter/mvadapter/data/objaverse_list_6w.json"
  background_color: gray
  image_names: ["0000", "0004", "0001", "0002", "0003", "0005"]
  image_modality: color
  num_views: 6
  prompt_db_path: "/data/xyp/MV-Adapter/mvadapter/data/objaverse_short_captions.json"
  return_prompt: true
  projection_type: ORTHO
  source_image_modality: ["plucker", "normal"]
  plucker_offset: 1.0
  plucker_scale: 2.0
  reference_root_dir: ["/data/xyp/MV-Adapter/mvadapter/data/texture_rand_easylight_objaverse"]
  reference_scene_list: ["/data/xyp/MV-Adapter/mvadapter/data/objaverse_list_6w.json"]
  reference_image_modality: color
  reference_image_names: ["0000", "0001", "0002", "0003", "0004"]
  train_indices: [0, -8]
  val_indices: [-8, null]
  test_indices: [-8, null]
  height: 512
  width: 512
  batch_size: 2
  num_workers: 8

system_cls: mvadapter.systems.mvadapter_image_sd.MVAdapterImageSDSystem
system:
  # [设置] 验证频率：每 500 step 验证一次
  check_train_every_n_steps: 500
  cleanup_after_validation_step: true
  cleanup_after_test_step: true

  pretrained_model_name_or_path: "Manojb/stable-diffusion-2-1-base"
  pretrained_adapter_name_or_path: "huanngzh/mv-adapter"
  pretrained_controlnet_name_or_path: "thibaud/controlnet-sd21-normalbae-diffusers"
  
  init_adapter_kwargs:
    self_attn_processor: "mvadapter.models.attention_processor.DecoupledMVRowSelfAttnProcessor2_0"
    cond_in_channels: 6
    copy_attn_weights: true
    zero_init_module_keys: ["to_out_mv", "to_out_ref"]

  train_cond_encoder: true
  trainable_modules: ["_mv", "_ref"]
  
  # [关键新增] 设置你希望的 scale
  train_control_scale: 0.7 
  
  prompt_drop_prob: 0.1
  image_drop_prob: 0.1
  cond_drop_prob: 0.1
  shift_noise: true
  shift_noise_mode: interpolated
  shift_noise_scale: 8.0

  noise_offset: 0.1
  input_perturbation: 0.0


  optimizer:
    name: AdamW
    args:
      lr: 1e-5
      betas: [0.9, 0.999]
      weight_decay: 0.01
    params:
      cond_encoder:
        lr: 1e-5
      unet:
        lr: 1e-5

  scheduler:
    name: ConstantLR
    interval: step
    args:
      factor: 1.0
      total_iters: 9999999

trainer:
  max_epochs: 20
  log_every_n_steps: 10
  num_sanity_val_steps: 0
  
  # [核心设置] 
  # 1. 验证频率 (steps)
  val_check_interval: 500  
  # 2. 验证集只跑前 15 个 batch (即 30 张图) 就够了，节省时间
  limit_val_batches: 10    
  
  enable_progress_bar: true
  precision: bf16-mixed
  gradient_clip_val: 1.0
  strategy: ddp
  accumulate_grad_batches: 1

checkpoint:
  save_last: true
  save_top_k: 3          # 保存最好的 3 个
  monitor: "val/lpips"   # 监控 LPIPS
  mode: "min"            # LPIPS 是越小越好 (min)，PSNR 是越大越好 (max)
  every_n_epochs: 1